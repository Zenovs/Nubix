name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libegl1 libegl-mesa0 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-cursor0 \
            xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
          DISPLAY: ":99"
        run: |
          xvfb-run --auto-servernum \
            -s "-screen 0 1280x720x24" \
            pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install "ruff>=0.3" "black>=24.0"

      - name: ruff
        run: ruff check nubix/ tests/ main.py

      - name: black
        run: black --check nubix/ tests/ main.py

      - name: Show versions (debug)
        if: always()
        run: ruff --version && black --version
