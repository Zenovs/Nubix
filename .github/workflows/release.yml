name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0 \
            desktop-file-utils fuse

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in package
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"${{ steps.version.outputs.VERSION }}\"/" nubix/__init__.py

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "Nubix" \
            --add-data "nubix/resources:nubix/resources" \
            --hidden-import "nubix" \
            --hidden-import "secretstorage" \
            --hidden-import "cryptography" \
            main.py

      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Assemble AppDir
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp dist/Nubix AppDir/usr/bin/nubix
          cp packaging/nubix.desktop AppDir/usr/share/applications/nubix.desktop
          cp packaging/nubix.desktop AppDir/nubix.desktop

          # Create a simple icon (replace with real icon later)
          convert -size 256x256 xc:#4A90D9 \
            -fill white -pointsize 80 -gravity center -annotate 0 "N" \
            AppDir/usr/share/icons/hicolor/256x256/apps/nubix.png 2>/dev/null || \
          python3 -c "
          try:
              from PIL import Image, ImageDraw, ImageFont
              img = Image.new('RGBA', (256,256), '#4A90D9')
              draw = ImageDraw.Draw(img)
              draw.text((90, 70), 'N', fill='white')
              img.save('AppDir/usr/share/icons/hicolor/256x256/apps/nubix.png')
          except:
              import shutil
              shutil.copy('AppDir/usr/bin/nubix', 'AppDir/usr/share/icons/hicolor/256x256/apps/nubix.png')
          " || true

          cp AppDir/usr/share/icons/hicolor/256x256/apps/nubix.png AppDir/nubix.png

          # AppRun entry point
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE="${SELF%/*}"
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/nubix" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCH=x86_64 appimagetool AppDir "Nubix-${VERSION}-x86_64.AppImage"

      - name: Build .deb package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DEB_DIR="nubix-deb/DEBIAN"
          BIN_DIR="nubix-deb/usr/local/bin"
          APPS_DIR="nubix-deb/usr/share/applications"

          mkdir -p "$DEB_DIR" "$BIN_DIR" "$APPS_DIR"

          cp dist/Nubix "$BIN_DIR/nubix"

          cat > "$DEB_DIR/control" << EOF
          Package: nubix
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Nubix Contributors <nubix@example.com>
          Depends: rclone
          Description: Cloud Sync Manager for Ubuntu
           Sync files with Google Drive, Dropbox, and Nextcloud.
           Uses rclone as the sync engine with a modern GUI.
          EOF

          cp packaging/nubix.desktop "$APPS_DIR/nubix.desktop"

          dpkg-deb --build nubix-deb "nubix-${VERSION}-amd64.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nubix v${{ steps.version.outputs.VERSION }}"
          body_path: CHANGELOG.md
          fail_on_unmatched_files: false
          files: |
            Nubix-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
            nubix-${{ steps.version.outputs.VERSION }}-amd64.deb
